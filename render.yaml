services:
  - type: web
    name: billease-api
    runtime: python
    region: singapore   # closest to India — change to frankfurt or ohio if needed
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: billease-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: billease-db
    region: singapore   # must match the web service region above
    plan: free
    databaseName: billing_db
    user: billease
